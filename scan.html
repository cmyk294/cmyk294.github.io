<!-- Username input + button -->

    </button>
</div>

<body class="bg-gray-800 min-h-screen p-6 font-sans text-gray-800">

    <div class="max-w-3xl mx-auto bg-gray-700 p-8 rounded-lg shadow-md">
        <h1
            class="mb-8 text-white text-center text-4xl font-extrabold leading-none tracking-tight text-gray-900 md:text-5xl lg:text-6xl">
            Scan2PSC</h1>

        <!-- <div class="text-center mb-6">
            <button id="darkModeToggle" type="button"
                class="px-4 py-2 bg-gray-800 text-white rounded-md hover:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-500 transition">

            </button>
        </div> -->

        <!-- Employee Dropdown -->
        <div class="mb-5">
            <label for="employeeSelect" class="block mb-2 text-sm font-medium text-white">
                Select Employee:
            </label>
            <select id="employeeSelect" class="block w-full rounded-lg border border-gray-300 bg-white px-3 py-2
               text-white placeholder-white
               focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none
               dark:border-gray-600 dark:bg-gray-900 dark:text-white dark:placeholder-white
               dark:focus:border-blue-400 dark:focus:ring-blue-400">
                <option class="text-gray-700 value="">-- Select Employee --</option>
            </select>
        </div>


        <!-- Table Dropdown -->
        <div class=" mb-5">
                    <label for="tableSelect" class="block mb-2 text-sm font-medium text-white">Select Tab:</label>
                    <select id="tableSelect" onchange="toggleQualificationFields()" class="block w-full rounded-md border border-gray-300 bg-white px-3 py-2
          text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500
          focus:outline-none">
                        <option value="">-- Select Tab --</option>
                        <option value="IDENTIFIERS">Identifiers</option>
                        <option value="EMPLOYEE_QUALIFICATIONS">Qualifications</option>
                        <option value="EMPLOYEE_WORK_EXPERIENCE">Employment History</option>
                        <option value="OTHER_DOCUMENTS">Other Documents</option>
                    </select>
        </div>

        <!-- Qualification / Identifier Fields -->
        <div id="qualificationFields" class="hidden mb-6 bg-gray-50 p-4 rounded-md border border-gray-200">
            <div id="typeFieldWrapper" class="mb-4">
                <label for="qualificationType" id="typeLabel"
                    class="block mb-1 text-sm font-medium text-gray-700">Qualification Type:</label>
                <select id="qualificationType" class="block w-full rounded-md border border-gray-300 bg-white px-3 py-2
            text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500
            focus:outline-none">
                    <option value="">-- Select Qualification Type --</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label for="fromYear" class="block mb-1 text-sm font-medium text-gray-700">From Year:</label>
                    <input id="fromYear" placeholder="Enter year (e.g. 2020)" type="number" min="1900" max="2100" class="block w-full rounded-md border border-gray-300 px-3 py-2
              text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500
              focus:outline-none" />
                </div>
                <div>
                    <label for="toYear" class="block mb-1 text-sm font-medium text-gray-700">To Year:</label>
                    <input id="toYear" placeholder="Enter year (e.g. 2022)" type="number" min="1900" max="2100" class="block w-full rounded-md border border-gray-300 px-3 py-2
              text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500
              focus:outline-none" />
                </div>
            </div>

            <div>
                <label for="fileName" class="block mb-1 text-sm font-medium text-gray-700">File Name:</label>
                <input type="text" id="fileName" placeholder="Enter file name (e.g. mydoc.pdf)" class="block w-full rounded-md border border-gray-300 px-3 py-2
            text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500
            focus:outline-none" required />
            </div>
        </div>

        <div id="identifierTypeDiv" class="hidden mb-4">
            <label for="identifierType" class="block mb-1 text-sm font-medium text-gray-700">Identifier Type:</label>
            <select id="identifierType" class="block w-full rounded-md border border-gray-300 bg-white px-3 py-2
        text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none">
                <option value="">-- Select Identifier Type --</option>
            </select>
        </div>


        <div id="identifierFileNameDiv" class="hidden mb-6 bg-gray-50 p-4 rounded-md border border-gray-200">
            <label for="fileNameIdentifier" class="block mb-1 text-sm font-medium text-gray-700">File Name:</label>
            <input type="text" id="fileNameIdentifier" placeholder="Enter file name (e.g. mydoc.pdf)" class="block w-full rounded-md border border-gray-300 px-3 py-2
      text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none" />
        </div>


        <!-- Other Documents Fields -->
        <div id="otherDocumentsFields" class="hidden mb-6 bg-gray-50 p-4 rounded-md border border-gray-200">
            <div class="mb-4">
                <label for="otherDocumentType" class="block mb-1 text-sm font-medium text-gray-700">Document
                    Type:</label>
                <select id="otherDocumentType" class="block w-full rounded-md border border-gray-300 bg-white px-3 py-2
            text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500
            focus:outline-none">
                    <option value="">-- Select Document Type --</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="otherTitle" class="block mb-1 text-sm font-medium text-gray-700">Title:</label>
                <input type="text" id="otherTitle" placeholder="Enter title" class="block w-full rounded-md border border-gray-300 px-3 py-2
            text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500
            focus:outline-none" />
            </div>

            <div>
                <label for="fileNameOther" class="block mb-1 text-sm font-medium text-gray-700">File Name:</label>
                <input type="text" id="fileNameOther" placeholder="Enter file name (e.g. mydoc.pdf)" class="block w-full rounded-md border border-gray-300 px-3 py-2
            text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500
            focus:outline-none" />
            </div>
        </div>

        <!-- Work Experience Filename Field -->
        <div id="workExperienceFileNameDiv" class="hidden mb-6 bg-gray-50 p-4 rounded-md border border-gray-200">
            <label for="fileNameWorkExperience" class="block mb-1 text-sm font-medium text-gray-700">File Name:</label>
            <input type="text" id="fileNameWorkExperience" placeholder="Enter file name (e.g. mydoc.pdf)" class="block w-full rounded-md border border-gray-300 px-3 py-2
          text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500
          focus:outline-none" />
        </div>



        <!-- Scan Button -->
        <div class="text-center mb-8">
            <button type="button" onclick="scanToPdf();" class="mt-2 inline-flex items-center px-8 py-3 text-white bg-blue-600 hover:bg-blue-700 rounded-md
          focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition cursor-pointer">
                Scan PDF
            </button>
        </div>

        <div id="images" class="flex flex-wrap gap-4 justify-center mb-6"></div>

        <!-- Form -->
        <form id="form1"
            action="https://ge67b10b5602444-cmsmprod.adb.us-ashburn-1.oraclecloudapps.com/ords/ppsc/pdfv/upload"
            method="POST" enctype="multipart/form-data" class="hidden">

            <input type="hidden" name="FILENAME" id="file_name_hidden" />
            <input type="hidden" name="MIMETYPE" value="application/pdf" />
            <input type="hidden" name="employee_id" id="employee_id" />
            <input type="hidden" name="table_name" id="table_name" />
            <input type="hidden" name="qualification_type_id" id="qualification_type_id" />
            <input type="hidden" name="identifier_type_id" id="identifier_type_id" />
            <input type="hidden" name="from_year_hidden" id="from_year_hidden" />
            <input type="hidden" name="to_year_hidden" id="to_year_hidden" />
            <input type="hidden" name="document_type_id" id="document_type_id" />
            <input type="hidden" name="title" id="title_hidden" />

            <div class="text-center">
                <input type="button" value="Submit" onclick="submitFormWithScannedImages();" class="cursor-pointer px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-md
          focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 transition" />
            </div>
        </form>

        <div id="server_response" class="mt-6 whitespace-pre-wrap text-center text-white"></div>
    </div>
